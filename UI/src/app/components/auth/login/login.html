<div class="login-wrapper">
  <div class="login-card">

    <div class="image-sec"></div>

    <div class="form-sec">
      <div class="form-inner">

        <div class="brand">
          <mat-icon class="brand-icon">table_chart</mat-icon>
          <span class="brand-name">Excel Data Viewer</span>
        </div>

        <h1>Welcome back</h1>
        <p class="signin-text">
          Don't have an account?
          <a routerLink="/signup">Sign Up</a>
        </p>

        <div *ngIf="errorMessage" class="server-error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

          <div class="form-group">
            <div class="field" [class.field-error]="(loginForm.get('username')?.dirty || submitted) && loginForm.get('username')?.errors">
              <mat-icon>person</mat-icon>
              <input type="text" placeholder="Username" formControlName="username" autocomplete="username" />
            </div>
            <small class="error">
              <ng-container *ngIf="(loginForm.get('username')?.dirty || submitted) && loginForm.get('username')?.errors?.['required']">
                Username is required
              </ng-container>
            </small>
          </div>

          <div class="form-group">
              <div class="field" [class.field-error]="(loginForm.get('password')?.dirty || submitted) && loginForm.get('password')?.errors">
                <mat-icon>lock</mat-icon>
                <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" formControlName="password" autocomplete="current-password" />
                <mat-icon class="eye-icon" (click)="showPassword = !showPassword">
                {{ showPassword ? 'visibility_off' : 'visibility' }}
                </mat-icon>
            </div>
            <small class="error">
              <ng-container *ngIf="loginForm.get('password')?.dirty || submitted">
                <ng-container *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</ng-container>
                <ng-container *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</ng-container>
              </ng-container>
            </small>
          </div>

          <button type="submit" [disabled]="loading">
            <span *ngIf="!loading">Login</span>
            <span *ngIf="loading" class="btn-loader">
              <span class="spinner"></span>
              Logging in...
            </span>
          </button>

        </form>
      </div>
    </div>

  </div>
</div>
