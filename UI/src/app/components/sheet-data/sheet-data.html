<div class="sheet-page">

  <!-- Navbar -->
  <nav class="sheet-nav">
    <div class="nav-left">
      <button class="btn btn-sm btn-outline-light" (click)="goBack()">Back</button>
      <span class="nav-file-name" *ngIf="fileName">{{ fileName }}</span>
      <span class="nav-sheet-badge" *ngIf="sheetName">{{ sheetName }}</span>
    </div>
    <div class="nav-right">
      <button class="btn btn-sm btn-outline-light" (click)="logOut()">Log Out</button>
    </div>
  </nav>

  <!-- Loading -->
  <div *ngIf="loading" class="page-loading">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3">Loading data...</p>
  </div>

  <!-- Error -->
  <div *ngIf="!loading && errorMessage" class="container py-5 text-center">
    <div class="alert alert-danger">{{ errorMessage }}</div>
    <button class="btn btn-primary mt-2" (click)="goBack()">Go Back</button>
  </div>

  <!-- Content -->
  <div *ngIf="!loading && !errorMessage" class="sheet-body">
    <div class="container-xl py-4">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-wrap">
            <input
              type="text"
              class="form-control search-input"
              placeholder="Search..."
              [(ngModel)]="searchText"
              (input)="onSearch()"
            />
          </div>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-primary btn-sm" (click)="openAddForm()">Add Data</button>
        </div>
      </div>

      <!-- Cards -->
      <div class="cards-grid" [class.blurred]="showAddForm">
        <div
          class="data-card"
          *ngFor="let row of filteredData"
          [class.expired]="row.isExpired"
        >
          <!-- Badges -->
          <span *ngIf="row.isExpired" class="badge-expired">Expired</span>
          <span
            *ngIf="row.showCounter && !row.isExpired"
            class="badge-countdown"
            [class.urgent]="row.daysLeft !== null && row.daysLeft < 6"
          >
            {{ row.daysLeft }} day(s) left
          </span>

          <!-- Card Fields -->
          <div class="card-fields">
            <div class="card-field" *ngFor="let key of displayableHeaders()">
              <span class="field-label">{{ key }}</span>
              <span class="field-value">{{ isDateKey(key) ? formatDate(row[key]) : (row[key] ?? '-') }}</span>
            </div>
          </div>

          <!-- Delete -->
          <div class="card-footer-actions">
            <button class="btn btn-danger btn-sm" (click)="deleteRow(row)" [disabled]="row.isExpired">Delete</button>
          </div>
        </div>

        <!-- Empty state -->
        <div *ngIf="filteredData.length === 0" class="empty-cards">
          <p>No records found.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Add Data Modal Overlay -->
  <div class="modal-overlay" *ngIf="showAddForm" (click)="showAddForm = false"></div>
  <div class="add-modal" *ngIf="showAddForm">
    <div class="add-modal-card">
      <div class="add-modal-header">
        <h5 class="add-modal-title">Add New Record</h5>
        <button class="btn-close-modal" (click)="showAddForm = false" aria-label="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div *ngIf="addError" class="alert alert-danger py-2 mx-4">{{ addError }}</div>

      <form [formGroup]="addForm" (ngSubmit)="onSubmitAdd()" novalidate class="add-modal-body">
        <div class="add-form-grid">
          <div class="form-group-field" *ngFor="let header of headers">
            <label class="form-label">{{ header }}</label>

            <!-- Doc type field with SOW/CR dropdown if auto-number sheet -->
            <ng-container *ngIf="isAutoNumberSheet && header === autoNumberDocTypeKey; else regularInput">
              <select
                class="form-select"
                [class.is-invalid]="(addForm.get(header)?.dirty || addSubmitted) && addForm.get(header)?.errors"
                [formControlName]="header"
                (change)="onDocTypeChange(addForm.get(header)?.value)"
              >
                <option value="" disabled selected>Select type</option>
                <option value="SOW">SOW</option>
                <option value="CR">CR</option>
              </select>
              <div class="autonumber-hint" *ngIf="autoNumberHint">{{ autoNumberHint }}</div>
            </ng-container>

            <ng-template #regularInput>
              <input
                type="text"
                class="form-control"
                [class.is-invalid]="(addForm.get(header)?.dirty || addSubmitted) && addForm.get(header)?.errors"
                [formControlName]="header"
                [placeholder]="header"
              />
            </ng-template>

            <div class="invalid-feedback">{{ header }} is required</div>
          </div>
        </div>

        <div class="add-modal-footer">
          <button type="button" class="btn btn-secondary" (click)="showAddForm = false">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="addLoading">
            <span *ngIf="!addLoading">Save</span>
            <span *ngIf="addLoading" class="d-flex align-items-center gap-2">
              <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
              Saving...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
